<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PhishGuard - Email Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#071321;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.hero{
    margin-top:40px;
}

.card{
    border:none;
    border-radius:18px;
}

.btn-custom{
    background:#00c896;
    color:white;
    font-weight:bold;
}

.btn-custom:hover{
    background:#00a97e;
}

.title{
    color:#00d9a6;
    font-weight:bold;
}

textarea{
    resize:none;
}

</style>

</head>

<body>

<div class="container hero">

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card shadow-lg">

<div class="card-body p-5">

<h1 class="text-center title">
🛡️ PhishGuard
</h1>

<p class="text-center text-dark">
Phishing Email Detector & Awareness System
</p>

<hr>

<form action="/analyze" method="POST">

<div class="mb-3">

<label class="form-label text-dark">
Sender Email
</label>

<input
type="email"
class="form-control"
name="sender"
placeholder="example@gmail.com"
required>

</div>

<div class="mb-3">

<label class="form-label text-dark">
Subject
</label>

<input
type="text"
class="form-control"
name="subject"
placeholder="Enter subject"
required>

</div>

<div class="mb-3">

<label class="form-label text-dark">
Email Body
</label>

<textarea
class="form-control"
rows="10"
name="body"
placeholder="Paste email here..."
required></textarea>

</div>

<div class="text-center">

<button  type="submit" class="btn btn-primary" id="analyzeBtn">
    Analyze Email
</button>
<a href="/quiz" class="btn btn-warning">
    🧠 Cyber Security Quiz
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
