<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#071321;
            color:white;
        }

        .card{
            border-radius:20px;
            text-align:center;
            margin-bottom:20px;
        }

        .number{
            font-size:40px;
            font-weight:bold;
        }

        #riskChart{
            max-width:500px;
            margin:auto;
        }
    </style>

</head>
<body>

<div class="container mt-5">

<h1 class="text-center text-success">📊 Dashboard</h1>

<hr>

<div class="row">

<div class="col-md-3">
<div class="card bg-primary text-white">
<div class="card-body">
<h5>Total Emails</h5>
<div class="number">{{ total }}</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white">
<div class="card-body">
<h5>High Risk</h5>
<div class="number">{{ high }}</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning">
<div class="card-body">
<h5>Medium Risk</h5>
<div class="number">{{ medium }}</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white">
<div class="card-body">
<h5>Low Risk</h5>
<div class="number">{{ low }}</div>
</div>
</div>
</div>

</div>

<div class="card mt-4">

<div class="card-body">

<h3 class="text-dark text-center">Risk Distribution</h3>

<canvas id="riskChart"></canvas>

</div>

</div>

<div class="text-center mt-4">

<a href="/" class="btn btn-primary">Analyze Email</a>

<a href="/history" class="btn btn-success">View History</a>

</div>

</div>

<script>

const ctx = document.getElementById('riskChart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['High Risk','Medium Risk','Low Risk'],
        datasets: [{
            data: [{{ high }}, {{ medium }}, {{ low }}],
            backgroundColor: [
                '#dc3545',
                '#ffc107',
                '#198754'
            ]
        }]
    },
    options: {
        responsive: true
    }
});

</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
